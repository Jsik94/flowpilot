version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: flowpilot-backend
    environment:
      PORT: 3001
      FRONTEND_URL: http://localhost:8080
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "3001:3001"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
    container_name: flowpilot-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
